<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finanzas Personales</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💰</text></svg>" />
  <link rel="stylesheet" href="css/styles.css?v=1" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-dot"></span>
      <h1>Gastos Fijos</h1>
    </div>
    <nav class="tabs">
      <button class="tab active" data-view="dashboard">Dashboard</button>
      <button class="tab" data-view="pagos">Pagos del mes</button>
      <button class="tab" data-view="abm">Gastos (ABM)</button>
    </nav>
    <div class="topbar-actions">
      <button id="btn-export" class="btn-ghost" title="Exportar datos">Exportar</button>
      <button id="btn-import" class="btn-ghost" title="Importar datos">Importar</button>
      <input type="file" id="file-import" accept="application/json" hidden />
    </div>
  </header>

  <main id="app"></main>

  <!-- Modal ABM -->
  <div id="modal" class="modal-overlay" hidden>
    <div class="modal">
      <div class="modal-head">
        <h3 id="modal-title">Nuevo gasto</h3>
        <button id="modal-close" class="icon-btn">&times;</button>
      </div>
      <form id="form-gasto" class="modal-body">
        <input type="hidden" id="f-id" />
        <div class="field">
          <label for="f-nombre">Nombre del gasto</label>
          <input type="text" id="f-nombre" required placeholder="Ej: Luz" />
        </div>
        <div class="field">
          <label for="f-banco">Banco / Medio de pago</label>
          <input type="text" id="f-banco" list="bancos-list" placeholder="Ej: Brubank" />
          <datalist id="bancos-list"></datalist>
        </div>
        <div class="field">
          <label for="f-categoria">Categoría</label>
          <select id="f-categoria">
            <option>Gastos Fijos</option>
            <option>Tarjetas de Crédito</option>
          </select>
        </div>
        <fieldset class="montos-grid">
          <legend>Montos por mes (año seleccionado)</legend>
          <div id="montos-inputs" class="montos-inputs"></div>
        </fieldset>
        <div class="modal-foot">
          <button type="button" id="btn-cancel" class="btn-ghost">Cancelar</button>
          <button type="submit" class="btn-primary">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <div id="toast" class="toast" hidden></div>

  <script src="js/seed.js?v=1"></script>
  <script src="js/store.js?v=1"></script>
  <script src="js/utils.js?v=1"></script>
  <script src="js/views/abm.js?v=1"></script>
  <script src="js/views/pagos.js?v=1"></script>
  <script src="js/views/dashboard.js?v=3"></script>
  <script src="js/app.js?v=1"></script>
</body>
</html>
